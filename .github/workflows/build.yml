name: Build difftastic-mini

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            name: Linux
            binary: difftastic-mini-linux
          - os: macos-latest
            name: macOS
            binary: difftastic-mini-macos
          - os: windows-latest
            name: Windows
            binary: difftastic-mini-windows.exe

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Run tests
        run: cargo test

      - name: Build release binary (Linux / macOS)
        if: matrix.os != 'windows-latest'
        run: |
          cargo build --release
          cp target/release/difftastic-mini ${{ matrix.binary }}

      - name: Build release binary (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          cargo build --release
          cp target/release/difftastic-mini.exe ${{ matrix.binary }}

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: difftastic-mini-${{ matrix.name }}
          path: ${{ matrix.binary }}

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v8

      - uses: softprops/action-gh-release@v3
        with:
          name: "difftastic-mini ${{ github.ref_name }}"
          body: |
            ## difftastic-mini ${{ github.ref_name }}

            A `diff` replacement that shows side-by-side word-level changes in the terminal.
            Single static binary. No runtime required.

            | Platform | File |
            |----------|------|
            | Linux    | `difftastic-mini-linux` |
            | macOS    | `difftastic-mini-macos` |
            | Windows  | `difftastic-mini-windows.exe` |

            ### Install

            ```bash
            # Linux / macOS
            chmod +x difftastic-mini-linux
            mv difftastic-mini-linux ~/.local/bin/difftastic-mini
            difftastic-mini --help

            # Or build from source
            git clone https://github.com/siyad01/difftastic-mini
            cd difftastic-mini
            cargo build --release
            cp target/release/difftastic-mini ~/.local/bin/
            ```

            ### Use as a git difftool

            ```bash
            git config --global diff.tool difftastic-mini
            git config --global difftool.difftastic-mini.cmd 'difftastic-mini "$LOCAL" "$REMOTE"'
            git config --global difftool.prompt false
            ```

            ### What's in this release
            - Myers diff algorithm via `similar` (same library cargo uses internally)
            - Word-level highlighting inside every changed line
            - Side-by-side and unified render modes
            - `--no-color`, `--width=N`, `--unified` flags
            - 8 passing correctness tests
            - Works on Linux, macOS, Windows, WSL2
          files: |
            difftastic-mini-Linux/difftastic-mini-linux
            difftastic-mini-macOS/difftastic-mini-macos
            difftastic-mini-Windows/difftastic-mini-windows.exe